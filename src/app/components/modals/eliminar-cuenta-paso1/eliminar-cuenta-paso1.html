<h2 class="titulo-rojo" cdkFocusInitial>Eliminar cuenta</h2>

<p class="texto">Esta acción es <span>irreversible</span>. ¿Estás seguro de que querés continuar?</p>

<div class="acciones">
  <button class="btn-base btn-danger" (click)="confirmar()">Estoy seguro</button>
  <button class="btn-base btn-secondary" (click)="cancelar()">Cancelar</button>
</div>
