<div class="modal-wrapper">
  
  <div class="modal-header">
    <h2 class="modal-title danger-title">Eliminar Cuenta</h2>
    <button type="button" class="btn-icon-close" (click)="cancelar()">
      <i class="fa-solid fa-xmark"></i>
    </button>
  </div>

  <form [formGroup]="form" class="modal-body simple-body" (submit)="eliminar()">
    
    <div class="instruction-content">
      <p class="texto-instruccion">
        Para confirmar esta acción, escribí "<span class="text-danger">eliminar</span>" debajo.
      </p>

      <div class="form-field">
        <input 
          type="text" 
          class="form-input text-center" 
          formControlName="confirm" 
          placeholder="eliminar" 
          autocomplete="off"
        />
      </div>
    </div>

  </form>

  <div class="modal-footer center-footer">
    <div class="footer-actions">
      <button type="button" class="btn-secondary-action" (click)="cancelar()">
        Cancelar
      </button>

      <button 
        type="button" 
        class="btn-danger-action" 
        [disabled]="form.invalid" 
        (click)="eliminar()"
      >
        Eliminar definitivamente
      </button>
    </div>
  </div>

</div>
