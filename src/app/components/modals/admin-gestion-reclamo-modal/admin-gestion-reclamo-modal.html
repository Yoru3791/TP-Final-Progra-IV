<div class="dialog-container">
  <h2 class="dialog-title">Gestionar Ticket: {{ data.codigoTicket }}</h2>

  <form [formGroup]="form" (ngSubmit)="guardar()">
    <div class="form-group">
      <label>Estado del Reclamo</label>
      <select formControlName="estado" class="form-input">
        @for (opt of estadosOptions; track opt.value) {
          <option [value]="opt.value">{{ opt.label }}</option>
        }
      </select>
    </div>

    <div class="form-group">
      <label>Devolución / Respuesta</label>
      <textarea
        formControlName="respuesta"
        rows="5"
        class="form-input textarea"
        placeholder="Escribí la solución o respuesta para el usuario."
      >
      </textarea>

      @if (form.get('respuesta')?.hasError('required') && form.get('respuesta')?.touched) {
        <p class="error-msg">
          <i class="fa-solid fa-triangle-exclamation"></i>
          Para cerrar el ticket, es obligatorio escribir una devolución.
        </p>
      }
    </div>

    <div class="dialog-actions">
      <button type="submit" class="btn-base btn-primary" [disabled]="form.invalid">Guardar Cambios</button>
      <button type="button" class="btn-base btn-secondary" (click)="cerrar()">Cancelar</button>
    </div>
  </form>
</div>
