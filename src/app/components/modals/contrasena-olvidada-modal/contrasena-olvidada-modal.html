<div class="modal-container">
  <h2>Recuperar Contraseña</h2>
  <p>Ingresa tu correo electrónico y te enviaremos un enlace para restablecer tu contraseña.</p>

  <form [formGroup]="form" (ngSubmit)="enviar()">
    <div class="form-field">
      <label for="email">Mail</label>
      <input type="email" id="email" formControlName="email" placeholder="ejemplo@correo.com" class="form-input">
      
      @if (form.get('email')?.touched && form.get('email')?.hasError('email')) {
        <span class="error-msg">Ingresa un mail válido.</span>
      }
    </div>

    <div class="modal-actions">
      <button type="button" class="btn-cancel" (click)="cancelar()">Cancelar</button>
      <button type="submit" class="btn-submit" [disabled]="form.invalid || isLoading()">
        @if (isLoading()) { Enviando... } @else { Enviar enlace }
      </button>
    </div>
  </form>
</div>
