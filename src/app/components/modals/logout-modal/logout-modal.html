<h2 class="titulo-rojo">Cerrar sesión</h2>

<p class="texto">
  ¿Estás seguro de que querés <span>cerrar tu sesión</span>?<br />
  Podés volver a ingresar en cualquier momento.
</p>

<div class="acciones">
  <button class="btn btn-cancelar" (click)="cancelar()">Cancelar</button>
  <button class="btn btn-rojo" (click)="confirmar()" cdkFocusInitial>Cerrar sesión</button>
</div>
