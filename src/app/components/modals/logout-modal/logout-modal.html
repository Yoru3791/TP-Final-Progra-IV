<div class="modal-wrapper">
  
  <div class="modal-header header-clean">
    <h2 class="modal-title">Cerrar Sesión</h2>
    <button type="button" class="btn-icon-close" (click)="cancelar()">
      <i class="fa-solid fa-xmark"></i>
    </button>
  </div>

  <div class="modal-body row-body">
    
    <div class="icon-column">
      <div class="icon-background">
        <i class="fa-solid fa-arrow-right-from-bracket"></i>
      </div>
    </div>

    <div class="text-column">
      <p class="logout-message">
        ¿Estás seguro de que querés cerrar tu sesión actual?
      </p>
    </div>

  </div>

  <div class="modal-footer footer-clean">
    <div class="footer-actions">
      <button type="button" class="btn-secondary-action" (click)="cancelar()">
        Cancelar
      </button>
      
      <button type="button" class="btn-primary-action" (click)="confirmar()">
        Cerrar sesión
      </button>
    </div>
  </div>

</div>
