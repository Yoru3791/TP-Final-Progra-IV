<div class="modal-container">
  <h2 class="modal-title">Datos de contacto</h2>

  <div class="modal-content">
    <div class="profile-img-container">
      <img
        [src]="data.imagenUrl || 'assets/placeholder-user.png'"
        class="profile-img"
        alt="Foto de perfil"
      />
    </div>

    <div class="dato">
      <span class="label">Nombre</span>
      <span class="valor">{{ data.nombre }}</span>
    </div>

    @if (data.email) {
      <div class="dato">
        <span class="label">Email</span>
        <span class="valor">{{ data.email }}</span>
      </div>
    }

    <div class="dato">
      <span class="label">Teléfono</span>
      <span class="valor">{{ data.telefono }}</span>
    </div>

    @if (role() !== 'ADMIN') {
      <div class="alerta">⚠️ Recomendación: reunite siempre en un lugar público y concurrido.</div>
    }
  </div>

  <div class="acciones">
    <button class="btn-base btn-secondary" (click)="cerrar()">Cerrar</button>
  </div>
</div>
