<div class="modal-unificado-container">
  <div class="header-modal">
    <h3 class="titulo-seccion">Datos de contacto</h3>
    <i class="fa-solid fa-xmark close-icon" (click)="cerrar()"></i>
  </div>

  <div class="divisor"></div>

  <div class="modal-content">
    <div class="datos-principales-wrapper">
      <div class="profile-img-container">
        <img
          [src]="data.imagenUrl || 'assets/placeholder-user.png'"
          class="profile-img"
          alt="Foto de perfil"
        />
      </div>

      <div class="info-container">
        <div class="dato">
          <span class="label">Nombre</span>
          <span class="valor">{{ data.nombre }}</span>
        </div>

        @if (data.email) {
          <div class="dato">
            <span class="label">Email</span>
            <span class="valor">{{ data.email }}</span>
          </div>
        }

        <div class="dato">
          <span class="label">Teléfono</span>
          <span class="valor">{{ data.telefono }}</span>
        </div>
      </div>
    </div>

    @if (role() !== 'ADMIN') {
      <div class="alerta">
        <i class="fa-solid fa-triangle-exclamation"></i>
        <p>Recomendación: reunite siempre en un lugar público y concurrido.</p>
      </div>
    }
  </div>

  <div class="acciones">
    <button class="btn btn-cerrar" (click)="cerrar()">Cerrar</button>
  </div>
</div>
