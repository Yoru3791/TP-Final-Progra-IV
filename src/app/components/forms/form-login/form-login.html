<form class="form-login" [formGroup]="formLogin" (ngSubmit)="login()">
  
  <!-- Email -->
  <div class="form-field">
    <label for="email" class="form-label">Email</label>
    <input 
      formControlName="email" 
      type="email" 
      class="form-input" 
      placeholder="ejemplo@email.com"
    />
  </div>

  <!-- Password -->
  <div class="form-field password-field">
    <label for="password" class="form-label">Contraseña</label>

    <div class="input-with-icon">
      <input
        formControlName="password"
        [type]="showPassword ? 'text' : 'password'"
        class="form-input"
        placeholder="Ingresá tu contraseña"
      />
      <button type="button" class="toggle-eye" (click)="togglePassword()" tabindex="-1">
        <i class="fa-solid {{ showPassword ? 'fa-eye' : 'fa-eye-slash' }}"></i>
      </button>
    </div>
  </div>

  <!-- Checkbox : "Recordarme" -->
  <div class="checkbox-container">
    <label>
      <input type="checkbox" formControlName="recordarme" />
      Recordarme
    </label>
  </div>

  <!-- Boton : "Ingresar" -->
  <button
    type="submit"
    class="btn-primary-action btn-full-width"
    [disabled]="!formLogin.valid"
  >
    Iniciar Sesión
  </button>

  <!-- Alerta de cuenta no verificada -->
  @if (unverifiedEmail) {
    <div class="account-warning">
      <p>
        <i class="fa-solid fa-triangle-exclamation"></i>
        Tu cuenta aún no ha sido validada.
      </p>
      
      <button type="button" class="btn-resend" (click)="reenviarCorreo()" [disabled]="isResending">
        @if (isResending) {
          Revisá tu bandeja de entrada.
        } @else {
          Reenviar email de activación
        }
      </button>
    </div>
  }
</form>
