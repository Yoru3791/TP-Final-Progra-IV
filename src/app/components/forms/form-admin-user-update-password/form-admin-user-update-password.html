<form class="form" [formGroup]="form" (ngSubmit)="onSubmit()">
  <!-- Password -->
  <div class="form-field password-field">
    <label for="password" class="form-label">Contraseña</label>

    <div class="input-with-icon">
      <input
        formControlName="password"
        [type]="showPassword ? 'text' : 'password'"
        class="form-input"
        [class.invalid]="mostrarError('password')"
        placeholder="Entre 8 y 16 caracteres, y al menos una mayúscula, una minúscula, un número y un carácter especial."
      />
      <button type="button" class="toggle-eye" (click)="togglePassword()">
        <i class="fa-solid {{ showPassword ? 'fa-eye-slash' : 'fa-eye' }}"></i>
      </button>
    </div>

    <div class="error-messages">
      @if (mostrarError('password')) {
        @if (form.get('password')?.hasError('required')) {
          <p>Campo obligatorio.</p>
        } @else if (form.get('password')?.hasError('pattern')) {
          <p>
            Entre 8 y 16 caracteres, y al menos una mayúscula, una minúscula, un número y un carácter especial.
          </p>
        }
      }
    </div>
  </div>

  <button
    type="submit"
    class="btn"
    [disabled]="!form.valid"
  >
    Cambiar contraseña
  </button>
</form>
