<div class="usuario-card" 
    [class.eliminado]="isDeleted()"
    [class.bloqueado]="isBanned()">

  <img class="card-img" [src]="usuario().imagenUrl" alt="Avatar" />

  <div class="info-block">
    <p class="nombre">{{ usuario().nombreCompleto }}</p>

    <div class="email-telefono-container">
      <p>{{ usuario().email }}</p>
      <p>{{ usuario().telefono }}</p>
    </div>
  </div>

  <div class="status-container">
    @if (isEditable() && !usuario().enabled && !isDeleted()) {
      <div class="not-enabled-container">
        <span>NO VERIFICADO</span>
        <button class="enable-button" (click)="enable()" title="Activar manualmente">
          <i class="fa-regular fa-circle-check"></i>
        </button>
      </div>
    }

    @if (isBanned()) {
      <p class="banned-text"><span>BLOQUEADO:</span> {{ banDate() }}</p>
    }

    @if (isDeleted()) {
      <p class="deleted-text"><span>ELIMINADO:</span> {{ deletionDate() }}</p>
    }
  </div>

  <div class="rol-container">
    <p>{{ usuario().rolUsuario }}</p>
  </div>

  <div class="buttons-container">
    <button
      class="btn"
      (click)="changePassword()"
      [disabled]="!isEditable()"
      title="Cambiar contraseña"
    >
      <i class="fa-solid fa-key"></i>
    </button>

    <button class="btn" (click)="edit()" [disabled]="!isEditable()" title="Actualizar">
      <i class="fa-regular fa-pen-to-square"></i>
    </button>

    <button
      class="btn"
      (click)="toggleBan()"
      [disabled]="!isEditable()"
      title="Bloquear/Desbloquear"
    >
      @if (isBanned()) {
        <i class="fa-solid fa-lock-open"></i>
      } @else {
        <i class="fa-solid fa-lock"></i>
      }
    </button>

    <button class="btn" (click)="delete()" [disabled]="!isEditable()" title="Eliminar">
      <i class="fa-regular fa-trash-can"></i>
    </button>
  </div>
</div>
