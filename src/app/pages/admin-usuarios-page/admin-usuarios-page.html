<div class="page-container">
  <div class="header-section">
    <h1 class="main-title">USUARIOS</h1>
    <p class="subtitulo">Administración de usuarios y permisos</p>
  </div>

  <div class="filters-container">
    <input
      class="filter-input"
      type="text"
      placeholder="Filtrar por nombre..."
      [value]="usuarioService.adminFiltroNombre()"
      (input)="onNameInput($event)"
    />

    <input
      class="filter-input"
      type="text"
      placeholder="Filtrar por email..."
      [value]="usuarioService.adminFiltroEmail()"
      (input)="onEmailInput($event)"
    />

    <label class="filter-input toggle-wrapper">
      <div class="switch">
        <input
          type="checkbox"
          [checked]="usuarioService.adminSoloEliminados()"
          (change)="onToggleEliminados($event)"
        />
        <span class="slider round"></span>
      </div>
      <span class="toggle-label">Ver eliminados</span>
    </label>

    <button class="btn btn-create" (click)="openUsuarioForm()">
      <i class="fa-solid fa-plus"></i>
      <span>Crear usuario</span>
    </button>
  </div>

  <div class="usuarios-list">
    @if (usuarios().length === 0) {
      <div class="no-results">
        <p>No se encontraron resultados.</p>
      </div>
    } @else {
      @for (usuario of usuarios(); track usuario.id) {
        <app-usuario-card [usuario]="usuario"></app-usuario-card>
      }

      @if (pageInfo(); as info) {
        <app-paginador 
          [currentPage]="info.number" 
          [totalPages]="info.totalPages" 
          (pageChange)="onPageChange($event)">
        </app-paginador>
      }
    }
  </div>
</div>
