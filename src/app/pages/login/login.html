<div class="main-form-container">
  <div class="header-container">
    <h1 class="main-h1-title">INICIÁ SESIÓN</h1>
    <p class="subtitle">Ingresá tu correo y contraseña</p>
  </div>

  <div class="login-wrapper">

    <app-form-login></app-form-login>

    <div class="separator">
      <span>O continuá con</span>
    </div>

    <app-google-login-button></app-google-login-button>

    <div class="links-container">
      <a (click)="openForgotPassword()" class="link">Olvidé mi contraseña</a>
      <a routerLink="/registro/cliente" class="link">No tengo cuenta</a>
    </div>

  </div>
</div>
